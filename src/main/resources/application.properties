# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── H2 In-Memory Database ───────────────────────────────────────────────────
# DB_CLOSE_DELAY=-1 keeps the database alive for the lifetime of the JVM
# DB_CLOSE_ON_EXIT=FALSE prevents H2 from closing when the last connection drops
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create-drop: schema is auto-created on startup and dropped on shutdown.
# This means data.sql seed data is loaded fresh every run — perfect for an exercise.
spring.jpa.hibernate.ddl-auto=create-drop

# Print SQL to console so you can see exactly what queries are running
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ensure data.sql runs AFTER Hibernate creates the schema
spring.jpa.defer-datasource-initialization=true

# ─── H2 Console ──────────────────────────────────────────────────────────────
# Access at: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:librarydb
# Username: sa  |  Password: (leave blank)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── Logging ─────────────────────────────────────────────────────────────────
# Shows notification thread names in logs — demonstrates async execution
logging.level.com.library.api=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ─── Swagger / OpenAPI ───────────────────────────────────────────────────────
# Access at: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
